<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bot AI | Professional AI Assistant</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', 'Roboto', 'Courier New', monospace;
      background: linear-gradient(135deg, #0a0e1a 0%, #0a0a0f 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    .cyber-container {
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      background: rgba(10, 14, 26, 0.95);
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 255, 255, 0.2), 0 0 20px rgba(0, 255, 255, 0.1);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 255, 255, 0.3);
    }
    
    .cyber-header {
      background: linear-gradient(90deg, #0a0e1a 0%, #1a1f2e 100%);
      padding: 20px 30px;
      border-bottom: 2px solid #00ffff;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }
    
    .logo-section {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .cyber-logo {
      font-size: 2.5em;
      animation: glow 2s ease-in-out infinite alternate;
    }
    
    @keyframes glow {
      from {
        text-shadow: 0 0 5px #00ffff;
      }
      
      to {
        text-shadow: 0 0 20px #00ffff, 0 0 30px #00ffff;
      }
    }
    
    .title {
      font-size: 1.8em;
      font-weight: bold;
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    
    .subtitle {
      font-size: 0.8em;
      color: #8892b0;
      margin-top: 5px;
    }
    
    .status-badge {
      display: flex;
      align-items: center;
      gap: 10px;
      background: rgba(0, 255, 255, 0.1);
      padding: 8px 15px;
      border-radius: 20px;
      border: 1px solid #00ffff;
    }
    
    .status-light {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #00ff00;
      animation: pulse 2s infinite;
    }
    
    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
      }
      
      50% {
        opacity: 0.5;
      }
    }
    
    .chat-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    
    .messages-container {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }
    
    .messages-container::-webkit-scrollbar {
      width: 8px;
    }
    
    .messages-container::-webkit-scrollbar-track {
      background: rgba(0, 255, 255, 0.1);
    }
    
    .messages-container::-webkit-scrollbar-thumb {
      background: #00ffff;
      border-radius: 10px;
    }
    
    .message {
      margin-bottom: 20px;
      animation: slideIn 0.3s ease-out;
    }
    
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    .user-message {
      display: flex;
      justify-content: flex-end;
    }
    
    .user-message .message-content {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 12px 20px;
      border-radius: 20px 20px 5px 20px;
      max-width: 70%;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    
    .ai-message {
      display: flex;
      justify-content: flex-start;
    }
    
    .ai-message .message-content {
      background: rgba(0, 255, 255, 0.1);
      border: 1px solid rgba(0, 255, 255, 0.3);
      color: #e0e0e0;
      padding: 12px 20px;
      border-radius: 20px 20px 20px 5px;
      max-width: 70%;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    
    .message-time {
      font-size: 0.7em;
      color: #8892b0;
      margin-top: 5px;
    }
    
    .input-area {
      padding: 20px;
      background: rgba(10, 14, 26, 0.95);
      border-top: 1px solid rgba(0, 255, 255, 0.2);
      display: flex;
      gap: 15px;
      align-items: flex-end;
    }
    
    #user-input {
      flex: 1;
      background: rgba(0, 255, 255, 0.05);
      border: 1px solid rgba(0, 255, 255, 0.3);
      border-radius: 10px;
      padding: 12px 20px;
      color: #e0e0e0;
      font-family: 'Segoe UI', monospace;
      font-size: 1em;
      resize: none;
      outline: none;
      transition: all 0.3s ease;
    }
    
    #user-input:focus {
      border-color: #00ffff;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    }
    
    .send-btn {
      background: linear-gradient(135deg, #00ffff, #ff00ff);
      border: none;
      border-radius: 10px;
      padding: 12px 25px;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      font-family: 'Segoe UI', monospace;
      font-size: 1em;
    }
    
    .send-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(0, 255, 255, 0.4);
    }
    
    .send-btn:active {
      transform: translateY(0);
    }
    
    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .typing-indicator {
      display: none;
      padding: 10px 20px;
      color: #00ffff;
      font-style: italic;
    }
    
    .typing-indicator.active {
      display: block;
    }
    
    .welcome-message {
      text-align: center;
      padding: 40px;
      color: #8892b0;
    }
    
    @media (max-width: 768px) {
      .title {
        font-size: 1.2em;
      }
      
      .user-message .message-content,
      .ai-message .message-content {
        max-width: 85%;
      }
    }
  </style>
</head>

<body>
  <div class="cyber-container">
    <div class="cyber-header">
      <div class="logo-section">
        <div class="cyber-logo">🔷</div>
        <div>
          <div class="title">CYBER AI <span style="font-size: 0.6em;">by Luffy Tech</span></div>
          <div class="subtitle">Advanced Neural Intelligence</div>
        </div>
      </div>
      <div class="status-badge">
        <div class="status-light"></div>
        <span>Active | Felo AI Engine</span>
      </div>
    </div>
    
    <div class="chat-area">
      <div class="messages-container" id="messages-container">
        <div class="welcome-message">
          <div>🤖 <strong>Cyber AI Online</strong></div>
          <div style="margin-top: 10px;">Ask me anything - I'm here to help!</div>
          <div style="margin-top: 20px; font-size: 0.9em;">⚡ Powered by Felo AI Engine</div>
        </div>
      </div>
      
      <div class="typing-indicator" id="typing-indicator">
        <span>⚡ Cyber AI is thinking</span><span>...</span>
      </div>
      
      <div class="input-area">
        <textarea id="user-input" placeholder="Type your message here... Press Enter to send" rows="2"></textarea>
        <button class="send-btn" id="send-btn">Send ➤</button>
      </div>
    </div>
  </div>
  
  <script>
    class CyberAI {
      constructor(apiUrl) {
        this.apiUrl = apiUrl;
      }
      
      async sendMessage(userText) {
        try {
          const url = `${this.apiUrl}?text=${encodeURIComponent(userText)}`;
          console.log('Calling API:', url);
          
          const response = await fetch(url);
          
          if (!response.ok) {
            throw new Error(`API Error ${response.status}: ${response.statusText}`);
          }
          
          const data = await response.json();
          console.log('Raw API Response:', data);
          return data;
        } catch (error) {
          console.error('API Error:', error);
          return {
            error: true,
            message: `⚠️ API Connection Error: ${error.message}\n\nThe server may be temporarily unavailable. Please try again in a moment.`
          };
        }
      }
    }
    
    // Initialize Cyber AI with NEW API endpoint
    const cyberAI = new CyberAI('https://apis.davidcyril.name.ng/ai/felo');
    
    // DOM Elements
    const messagesContainer = document.getElementById('messages-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const typingIndicator = document.getElementById('typing-indicator');
    
    let isSending = false;
    let welcomeRemoved = false;
    
    // Add message to chat
    function addMessage(text, isUser, timestamp = new Date()) {
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${isUser ? 'user-message' : 'ai-message'}`;
      
      const timeStr = timestamp.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      
      messageDiv.innerHTML = `
                <div>
                    <div class="message-content">${escapeHtml(text)}</div>
                    <div class="message-time">${isUser ? 'You' : 'Cyber AI'} • ${timeStr}</div>
                </div>
            `;
      
      messagesContainer.appendChild(messageDiv);
      messagesContainer.scrollTop = messagesContainer.scrollHeight;
    }
    
    // Escape HTML to prevent XSS
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    // Extract ONLY the AI's main response from various possible JSON structures
    function extractAIResponse(data) {
      // If it's an error
      if (data.error) {
        return data.message;
      }
      
      // If it's a string, return it directly
      if (typeof data === 'string') {
        return data;
      }
      
      // Common response field names from various APIs
      const possibleFields = [
        'response',
        'text',
        'message',
        'content',
        'reply',
        'answer',
        'generated_text',
        'output',
        'result',
        'data',
        'candidates',
        'choices',
        'ai_response',
        'bot_response'
      ];
      
      // Check each possible field
      for (const field of possibleFields) {
        if (data[field]) {
          // Handle Gemini's candidates structure
          if (field === 'candidates' && Array.isArray(data[field]) && data[field][0]) {
            const candidate = data[field][0];
            if (candidate.content) return candidate.content;
            if (candidate.text) return candidate.text;
            if (candidate.message) return candidate.message;
            return JSON.stringify(candidate);
          }
          
          // Handle OpenAI's choices structure
          if (field === 'choices' && Array.isArray(data[field]) && data[field][0]) {
            const choice = data[field][0];
            if (choice.message?.content) return choice.message.content;
            if (choice.text) return choice.text;
            return JSON.stringify(choice);
          }
          
          // Direct field value
          if (typeof data[field] === 'string') return data[field];
          if (typeof data[field] === 'object') return JSON.stringify(data[field]);
        }
      }
      
      // If no known field found, return a user-friendly message
      console.warn('Unknown response format:', data);
      return "🤖 I've received your message and processed it successfully.";
    }
    
    // Send message to AI
    async function sendMessage() {
      const text = userInput.value.trim();
      
      // Don't send empty messages or while already sending
      if (!text || isSending) return;
      
      // Remove welcome message on first message
      if (!welcomeRemoved) {
        const welcomeDiv = document.querySelector('.welcome-message');
        if (welcomeDiv) welcomeDiv.remove();
        welcomeRemoved = true;
      }
      
      // Clear input and reset height
      userInput.value = '';
      userInput.style.height = 'auto';
      
      // Add user message
      addMessage(text, true);
      
      // Disable send button and show typing indicator
      isSending = true;
      sendBtn.disabled = true;
      typingIndicator.classList.add('active');
      
      try {
        // Get AI response
        const response = await cyberAI.sendMessage(text);
        
        // Extract only the main AI response
        const aiText = extractAIResponse(response);
        
        // Add AI response (clean, no raw JSON)
        addMessage(aiText, false);
      } catch (error) {
        addMessage(`⚠️ System Error: ${error.message}\n\nPlease check your connection and try again.`, false);
      } finally {
        // Re-enable send button and hide typing indicator
        isSending = false;
        sendBtn.disabled = false;
        typingIndicator.classList.remove('active');
        userInput.focus();
      }
    }
    
    // Auto-resize textarea
    function autoResizeTextarea() {
      userInput.style.height = 'auto';
      userInput.style.height = Math.min(userInput.scrollHeight, 150) + 'px';
    }
    
    // Event Listeners
    sendBtn.addEventListener('click', function(e) {
      e.preventDefault();
      sendMessage();
    });
    
    userInput.addEventListener('keypress', function(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
    
    userInput.addEventListener('input', autoResizeTextarea);
    
    // Focus on input on load
    userInput.focus();
    
    // Test API on load
    async function testConnection() {
      try {
        const testResponse = await fetch('https://apis.davidcyril.name.ng/ai/felo?text=test');
        if (testResponse.ok) {
          console.log('✅ API connection successful');
        } else {
          console.warn('⚠️ API returned status:', testResponse.status);
        }
      } catch (error) {
        console.warn('⚠️ API connection test failed:', error.message);
      }
    }
    testConnection();
  </script>
</body>

</html>
